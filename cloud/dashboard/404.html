<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Frontguard Cloud</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-family:'Inter',system-ui,sans-serif;background:#0a0a0a;color:#e5e5e5;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{text-align:center;max-width:440px}
.code{font-size:96px;font-weight:700;letter-spacing:-4px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
h1{font-size:20px;font-weight:600;margin:16px 0 8px;letter-spacing:-.3px}
p{color:#888;font-size:14px;line-height:1.6;margin-bottom:28px}
a{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#e5e5e5;text-decoration:none;font-size:13px;font-weight:500;transition:all .15s}
a:hover{background:#222;border-color:#444}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to Dashboard
  </a>
</div>
</body>
</html>
