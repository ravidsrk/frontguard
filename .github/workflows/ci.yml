name: CI

on:
  push:
    branches: [main, ravidsrk/agent-ready]
  pull_request:
    branches: [main, ravidsrk/agent-ready]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Install Playwright browsers
        # The unit test suite for packages/cli reaches the discovery /
        # pipeline-unreachable paths which try to launch chromium. Install
        # browsers so the launch succeeds and the tests exercise the real
        # error branches (e.g. ECONNREFUSED on an unreachable base URL),
        # not "browser missing".
        run: npx playwright install --with-deps chromium
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run CLI e2e tests
        run: npm run test:e2e --workspace=packages/cli

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # Fails if VERSION drifted from any version-coupled file (package.json,
      # action.yml, Dockerfile, README, cli/mcp version constants).
      - run: npm run sync-version:check

  docs-links:
    # Guards apps/web docs-content.ts against broken internal /docs links
    # and non-canonical action refs. Dependency-free Node script — no build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check docs internal links + action refs
        run: node apps/web/scripts/check-doc-links.mjs

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Check bundle size
        # Gates the library entry (dist/index.js, built from src/core/pipeline.ts).
        # Runtime deps are externalized in tsup.config.ts, so this measures only
        # first-party code — a regression here means our own bundle grew, not a dep.
        # Budget bumped to 180KB in v0.2 to accommodate the Docker render adapter
        # (IN-7) and Storybook discovery (IN-9) modules; previous budget was 160KB.
        run: |
          SIZE=$(wc -c < packages/cli/dist/index.js)
          echo "Bundle size: $SIZE bytes (budget 180000)"
          if [ "$SIZE" -gt 180000 ]; then
            echo "⚠️ Bundle exceeds 180KB"
            exit 1
          fi

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: npm audit (prod, high+)
        run: npm audit --omit=dev --audit-level=high
