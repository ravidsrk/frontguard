name: Visual Regression Tests
on:
  pull_request:
    branches: [main]

jobs:
  visual-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for baseline branch access

      - name: Deploy Preview
        id: deploy
        # Your deployment step here (Vercel, Netlify, etc.)
        # Example for Vercel:
        #   uses: amondnet/vercel-action@v25
        #   with:
        #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
        #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        run: echo "Replace this step with your deployment"

      - name: Visual Regression Test
        uses: ravidsrk/frontguard@v1
        with:
          url: ${{ steps.deploy.outputs.preview-url }}
        env:
          FRONTGUARD_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
