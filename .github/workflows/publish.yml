name: Publish

# Triggered on version tags (e.g. v0.1.0, v1.2.3).
# Builds all packages and publishes the public npm packages with provenance.
#
# Notes:
#   - @frontguard/cloud-api is currently marked "private": true in its
#     package.json, so it is intentionally NOT published here. If it is ever
#     made public (remove "private": true), uncomment the cloud-api matrix entry
#     below — the per-package guard step will then allow it through.
#   - Provenance requires `id-token: write` permission and a public registry.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for npm provenance (--provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/cli # @frontguard/cli
          - packages/playwright # @frontguard/playwright
          # - packages/cloud-api  # currently "private": true — skipped (see guard step)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Guard — skip private packages
        id: guard
        run: |
          PKG_JSON="${{ matrix.package }}/package.json"
          if [ ! -f "$PKG_JSON" ]; then
            echo "::warning::$PKG_JSON not found — skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          IS_PRIVATE=$(node -p "require('./$PKG_JSON').private === true")
          NAME=$(node -p "require('./$PKG_JSON').name")
          if [ "$IS_PRIVATE" = "true" ]; then
            echo "::warning::$NAME is marked private — skipping publish"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Publishing $NAME"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.guard.outputs.publish == 'true'
        working-directory: ${{ matrix.package }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
