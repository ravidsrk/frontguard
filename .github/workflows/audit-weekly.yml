name: Weekly npm audit

on:
  schedule:
    # Monday 09:00 America/Los_Angeles (PDT, UTC-7)
    - cron: '0 16 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Capture production audit JSON
        run: npm audit --omit=dev --json > audit-current.json || true
      - name: Post weekly audit diff to issue
        uses: actions/github-script@v7
        env:
          AUDIT_LABEL: npm-audit-weekly
        with:
          script: |
            const fs = require('node:fs');
            const { owner, repo } = context.repo;
            const label = process.env.AUDIT_LABEL;
            const title = 'Weekly npm audit (production tree)';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            let issueNumber;
            if (issues.length === 0) {
              const { data: created } = await github.rest.issues.create({
                owner,
                repo,
                title,
                labels: [label, 'dependencies'],
                body: [
                  'Automated weekly npm audit reports for the production dependency tree.',
                  '',
                  'Command: `npm audit --omit=dev --json`',
                  '',
                  'New reports are posted as comments below with a diff against the previous run.',
                ].join('\n'),
              });
              issueNumber = created.number;
            } else {
              issueNumber = issues[0].number;
            }

            let previousPath = null;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 1,
              direction: 'desc',
            });

            if (comments.length > 0) {
              const match = comments[0].body.match(/<!-- audit-metadata:([^>]+) -->/);
              if (match) {
                try {
                  const decoded = Buffer.from(match[1], 'base64').toString('utf8');
                  fs.writeFileSync('audit-previous.json', decoded);
                  previousPath = 'audit-previous.json';
                } catch (err) {
                  core.warning(`Failed to decode previous audit metadata: ${err}`);
                }
              }
            }

            const args = ['scripts/audit-weekly-report.mjs', 'audit-current.json'];
            if (previousPath) args.push(previousPath);

            const { execFileSync } = require('node:child_process');
            const report = execFileSync('node', args, { encoding: 'utf8' });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: report,
            });