# Frontguard Slack app manifest.
#
# Deploy target: Cloudflare Workers (see ../wrangler.toml). Host the worker
# behind `slack.frontguard.dev` (either via a Workers custom route or the
# stock `*.workers.dev` subdomain — update the URLs below to match).
#
# Create the app:
#   1. https://api.slack.com/apps → "Create New App" → "From an app manifest".
#   2. Pick your workspace, paste this YAML, and confirm.
#   3. After creation, copy:
#        - Signing Secret      → wrangler secret put SLACK_SIGNING_SECRET
#        - Client ID / Secret  → wrangler secret put SLACK_CLIENT_ID
#                                wrangler secret put SLACK_CLIENT_SECRET
#   4. Set the OAuth redirect URL in Slack to the same value as
#      `oauth_config.redirect_urls[0]` below, and put it in the env as
#      SLACK_REDIRECT_URI.
#
# All three URLs below MUST point at the same deployed worker; the only
# thing varying is the path. If you self-host on a different domain,
# replace `slack.frontguard.dev` with your own host everywhere.

display_information:
  name: Frontguard
  description: AI-powered visual regression alerts and checks, in Slack.
  background_color: "#0d1117"

features:
  bot_user:
    display_name: frontguard
    always_online: true
  slash_commands:
    - command: /frontguard
      url: https://slack.frontguard.dev/slack/commands
      description: Run a visual check or get help
      usage_hint: status <url>
      should_escape: false

oauth_config:
  redirect_urls:
    - https://slack.frontguard.dev/slack/oauth/callback
  scopes:
    bot:
      - chat:write
      - commands

settings:
  event_subscriptions:
    request_url: https://slack.frontguard.dev/slack/events
    bot_events:
      - app_mention
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
